openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: trips
    description: Trip management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerUser
      tags: [auth]
      summary: Register a new user
      description: >
        Always returns 200 with the same generic response regardless of whether
        the email was already registered, to prevent account enumeration.
        Callers must proceed to /auth/login to obtain a session token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserRegistration"
      responses:
        "200":
          description: Registration processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterResult"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Log in with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCredentials"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips:
    get:
      operationId: listTrips
      tags: [trips]
      summary: List all trips for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Trip list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: createTrip
      tags: [trips]
      summary: Create a new trip
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripInput"
      responses:
        "201":
          description: Created trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/batch:
    post:
      operationId: batchUpsertTrips
      tags: [trips]
      summary: Upsert multiple trips at once (for initial sync)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripBatch"
      responses:
        "200":
          description: Upserted trips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Trip"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trips/{id}:
    patch:
      operationId: updateTrip
      tags: [trips]
      summary: Update a trip
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TripUpdate"
      responses:
        "200":
          description: Updated trip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Trip"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteTrip
      tags: [trips]
      summary: Delete a trip
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trip not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    RegisterResult:
      type: object
      required: [success, message]
      properties:
        success:
          type: boolean
        message:
          type: string

    UserRegistration:
      type: object
      required: [email, name, plate, password]
      properties:
        email:
          type: string
        name:
          type: string
        plate:
          type: string
        password:
          type: string

    UserCredentials:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [token, email, name, plate]
      properties:
        token:
          type: string
        email:
          type: string
        name:
          type: string
        plate:
          type: string

    Waypoint:
      type: object
      required: [addr, lat, lon, timestamp]
      properties:
        addr:
          type: string
        lat:
          type: number
        lon:
          type: number
        timestamp:
          type: number
        note:
          type: string

    Trip:
      type: object
      required: [id, date, startAddr, endAddr, km, dur, type, deleted]
      properties:
        id:
          type: string
        date:
          type: string
        startAddr:
          type: string
        endAddr:
          type: string
        startLat:
          type: number
        startLon:
          type: number
        endLat:
          type: number
        endLon:
          type: number
        km:
          type: number
        dur:
          type: integer
        type:
          type: string
          enum: [business, private]
        edited:
          type: ["boolean", "null"]
        deleted:
          type: boolean
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/Waypoint"

    TripInput:
      type: object
      required: [id, date, startAddr, endAddr, km, dur, type]
      properties:
        id:
          type: string
        date:
          type: string
        startAddr:
          type: string
        endAddr:
          type: string
        startLat:
          type: number
        startLon:
          type: number
        endLat:
          type: number
        endLon:
          type: number
        km:
          type: number
        dur:
          type: integer
        type:
          type: string
          enum: [business, private]
        edited:
          type: ["boolean", "null"]
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/Waypoint"

    TripUpdate:
      type: object
      properties:
        date:
          type: string
        startAddr:
          type: string
        endAddr:
          type: string
        startLat:
          type: number
        startLon:
          type: number
        endLat:
          type: number
        endLon:
          type: number
        km:
          type: number
        dur:
          type: integer
        type:
          type: string
          enum: [business, private]
        edited:
          type: ["boolean", "null"]
        waypoints:
          type: array
          items:
            $ref: "#/components/schemas/Waypoint"

    TripBatch:
      type: object
      required: [trips]
      properties:
        trips:
          type: array
          items:
            $ref: "#/components/schemas/TripInput"
